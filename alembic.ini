# Alembic configuration for Teacher's Eye
# Run migrations: alembic upgrade head
# Create new revision: alembic revision --autogenerate -m "description"

[alembic]
script_location = server/migrations
prepend_sys_path = .
version_path_separator = os

# SQLite DB — mirrors server/models.py DATABASE_URL
sqlalchemy.url = sqlite:///./teacher_eye.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
